<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Case Dashboard</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2>HLC Command Center</h2>
        <input type="text" id="searchInput" onkeyup="filterTable()" class="form-control mb-3" placeholder="Search by name, country, or ID...">
        
        <table class="table table-hover bg-white border">
            <thead>
                <tr>
                    <th>ID</th><th>Patient</th><th>Country</th><th>Stage</th><th>Status</th><th>Notes</th><th>Edit</th>
                </tr>
            </thead>
            <tbody id="caseBody">
                <tr><td colspan="7" class="text-center">Loading cases...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content p-3">
                <h5>Update Case</h5>
                <input type="hidden" id="editId">
                <select id="editStage" class="form-select mb-2"><option>Quote</option><option>Treatment</option></select>
                <select id="editStatus" class="form-select mb-2"><option>New</option><option>In Process</option><option>Closed</option></select>
                <textarea id="editNotes" class="form-control mb-2" placeholder="Notes"></textarea>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDHUbYjX8ktsLr9TYvF_eDRgjhW9IOmSzVzn-QSHCzPPG223akAMSroCE7zrT0RK0rg/exec";

        function fetchCases() {
            const callbackName = 'callback' + Math.floor(Math.random() * 1000000);
            window[callbackName] = (result) => { renderTable(result.data); delete window[callbackName]; };
            const script = document.createElement('script');
            script.src = SCRIPT_URL + "?action=getCases&callback=" + callbackName;
            document.body.appendChild(script);
        }

        function renderTable(data) {
            const tbody = document.getElementById('caseBody');
            tbody.innerHTML = '';
            for(let i = 1; i < data.length; i++) {
                let row = data[i];
                // Display: ID(0), Name(3), Country(6), Stage(15), Status(13), Notes(16)
                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td><td>${row[3]}</td><td>${row[6]}</td>
                    <td>${row[15]}</td><td>${row[13]}</td><td>${row[16] || ''}</td>
                    <td><button class="btn btn-sm btn-info" onclick="openModal('${row[0]}','${row[15]}','${row[13]}','${row[16]||''}')">Edit</button></td>
                </tr>`;
            }
        }

        function openModal(id, stage, status, notes) {
            document.getElementById('editId').value = id;
            document.getElementById('editStage').value = stage;
            document.getElementById('editStatus').value = status;
            document.getElementById('editNotes').value = notes;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        function saveEdit() {
            const id = document.getElementById('editId').value;
            const stage = document.getElementById('editStage').value;
            const status = document.getElementById('editStatus').value;
            const notes = document.getElementById('editNotes').value;
            
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=updateCase&caseId=${id}&stage=${stage}&status=${status}&notes=${encodeURIComponent(notes)}&callback=location.reload`;
            document.body.appendChild(script);
        }

        function filterTable() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.getElementById("caseBody").getElementsByTagName("tr");
            for (let row of rows) row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        }
        
        fetchCases();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
