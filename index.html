<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Case Dashboard</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2>HLC Command Center</h2>
        <!-- Tabs for Switching Views -->
        <ul class="nav nav-tabs">
            <li class="nav-item"><a class="nav-link active" onclick="showTab('active')">Active Cases</a></li>
            <li class="nav-item"><a class="nav-link" onclick="showTab('history')">History</a></li>
        </ul>
        
        <div id="dashboard" class="mt-3 p-3 bg-white border">
            <!-- Table will be injected here by JavaScript -->
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th><th>Patient</th><th>Country</th><th>Status</th><th>Edit</th>
                    </tr>
                </thead>
                <tbody id="caseBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDHUbYjX8ktsLr9TYvF_eDRgjhW9IOmSzVzn-QSHCzPPG223akAMSroCE7zrT0RK0rg/exec";

        async function fetchCases() {
            const response = await fetch(SCRIPT_URL + "?action=getCases");
            const data = await response.json();
            renderTable(data);
        }

        function renderTable(data) {
            // Logic to filter: if tab is 'active', filter out "Closed" or "Completed" status
            const tbody = document.getElementById('caseBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                // Assuming Status is index 13 (Column N)
                let rowHtml = `<tr><td>${row[0]}</td><td>${row[3]}</td><td>${row[6]}</td><td>${row[13]}</td><td><button class="btn btn-sm btn-primary">Edit</button></td></tr>`;
                tbody.innerHTML += rowHtml;
            });
        }
        
        fetchCases();
    </script>
</body>
</html>
