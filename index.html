<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Bangalore</title>
    <style>.urgent-row { background-color: #f8d7da; }</style>
</head>
<body class="bg-light">
    <div class="container-fluid mt-4">
        <h2>HLC Bangalore</h2>
        <input type="text" id="searchInput" class="form-control mb-3" onkeyup="renderTable()" placeholder="Search...">
        <table class="table table-hover bg-white border">
            <thead>
                <tr>
                    <th>ID</th><th>Patient</th><th>Country</th><th>Congregation</th><th>Diagnosis</th><th>Stage</th><th>Status</th><th>HLC</th><th>PVG</th><th>Doctor</th><th>Hospital</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="caseBody"></tbody>
        </table>
        <button class="btn btn-primary mb-4" onclick="loadClosed()">Load Older Cases</button>
    </div>

    <div class="modal" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-4">
                <h5>Case Details</h5>
                <div id="detailsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDHUbYjX8ktsLr9TYvF_eDRgjhW9IOmSzVzn-QSHCzPPG223akAMSroCE7zrT0RK0rg/exec";
        let cachedData = [], currentMonths = 0, currentCaseId = "", dropdownData = { hlcs: [], pvgs: [] };

        async function init(m = 0) {
            const cb = 'cb_' + Math.round(100000 * Math.random());
            window[cb] = (res) => { 
                cachedData = (m === 0) ? res.data : cachedData.slice(0, 1).concat(cachedData.slice(1).concat(res.data.slice(1)));
                dropdownData = res.dropdowns || { hlcs: [], pvgs: [] };
                renderTable(); 
            };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=getCases&months=${m}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function renderTable() {
            const filter = document.getElementById("searchInput").value.toLowerCase();
            const tbody = document.getElementById('caseBody');
            const order = { "New": 1, "In Process": 2, "Closed": 3 };
            let sortedData = cachedData.slice(1).filter(row => row.some(c => String(c).toLowerCase().includes(filter)))
                             .sort((a, b) => (order[a[13]] || 4) - (order[b[13]] || 4));
            tbody.innerHTML = '';
            sortedData.forEach(row => {
                tbody.innerHTML += `<tr>
                    <td>${row[0]}</td><td>${row[3]}</td><td>${row[6]}</td><td>${row[7]}</td>
                    <td>${row[12]}</td><td>${row[16]}</td><td>${row[13]}</td><td>${row[9]}</td>
                    <td>${row[11]}</td><td>${row[14]}</td><td>${row[15]}</td>
                    <td><button class="btn btn-sm btn-info" onclick="showDetails('${row[0]}')">Details</button></td>
                </tr>`;
            });
        }

        function showDetails(id) {
            currentCaseId = id;
            const row = cachedData.find(r => r[0] === id);
            const headers = ["Case_ID", "Date", "Source", "Patient", "Age", "Sex", "Country", "Congregation", "Priority", "Primary_HLC", "Secondary_HLC", "PVG", "Diagnosis", "Status", "Treating_Dr", "Hospital", "Workflow_Stage", "Notes"];
            let html = `<table class="table table-bordered" id="detailsTable">`;
            headers.forEach((h, idx) => {
                html += `<tr><th>${h}</th><td class="cell-val" data-value="${row[idx]||''}">${row[idx]||''}</td></tr>`;
            });
            html += `</table><div id="modalActions"><button class="btn btn-primary" onclick="toggleEdit()">Edit</button> <button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`;
            document.getElementById('detailsContent').innerHTML = html;
            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        }

        function toggleEdit() {
            const cells = document.querySelectorAll('.cell-val');
            const actions = document.getElementById('modalActions');
            
            cells.forEach((cell, idx) => {
                const val = cell.getAttribute('data-value');
                
                // ID (0) and Date (1) are read-only
                if (idx === 0 || idx === 1) {
                    cell.innerHTML = `<input class="form-control" value="${val}" readonly>`;
                } 
                // Primary_HLC is at index 9
                else if (idx === 9) {
                    let options = dropdownData.hlcs.map(h => `<option value="${h}" ${val === h ? 'selected' : ''}>${h}</option>`).join('');
                    cell.innerHTML = `<select class="form-control">${options}</select>`;
                }
                // PVG is at index 11
                else if (idx === 11) {
                    let options = dropdownData.pvgs.map(p => `<option value="${p}" ${val === p ? 'selected' : ''}>${p}</option>`).join('');
                    cell.innerHTML = `<select class="form-control">${options}</select>`;
                }
                // All other fields
                else {
                    cell.innerHTML = `<input class="form-control" value="${val}">`;
                }
            });
            
            actions.innerHTML = `
                <button class="btn btn-success" onclick="saveModalChanges()">Save</button>
                <button class="btn btn-secondary" onclick="resetView()">Cancel</button>`;
        }

        async function saveModalChanges() {
            const controls = document.getElementById('detailsTable').querySelectorAll('input, select');
            const params = new URLSearchParams({ action: 'updateCase', caseId: currentCaseId, patient: controls[3].value, country: controls[6].value, congregation: controls[7].value, diagnosis: controls[12].value, stage: controls[16].value, status: controls[13].value, hlc: controls[9].value, pvg: controls[11].value, doctor: controls[14].value, hospital: controls[15].value });
            
            const modalEl = document.getElementById('detailsModal');
            bootstrap.Modal.getInstance(modalEl).hide();
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            
            await fetch(`${SCRIPT_URL}?${params.toString()}&callback=cb`);
            alert("Saved!"); init();
        }

        function resetView() { showDetails(currentCaseId); }
        function closeModal() { bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide(); }
        function loadClosed() { init(currentMonths += 2); }
        
        init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
