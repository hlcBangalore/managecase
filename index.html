<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Case Dashboard</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2>HLC Command Center</h2>
        <table class="table table-hover bg-white border mt-3">
            <thead>
                <tr>
                    <th>ID</th><th>Patient</th><th>Country</th><th>Status</th><th>Edit</th>
                </tr>
            </thead>
            <tbody id="caseBody">
                <tr><td colspan="5" class="text-center">Loading cases...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // REPLACE WITH THE URL FROM YOUR "NEW VERSION" DEPLOYMENT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDHUbYjX8ktsLr9TYvF_eDRgjhW9IOmSzVzn-QSHCzPPG223akAMSroCE7zrT0RK0rg/exec";

        // JSONP Implementation to bypass CORS
        function fetchCases() {
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            
            // Define the callback function globally
            window[callbackName] = function(result) {
                renderTable(result.data);
                delete window[callbackName];
                document.getElementById('scriptTag').remove();
            };

            const script = document.createElement('script');
            script.id = 'scriptTag';
            script.src = SCRIPT_URL + "?action=getCases&callback=" + callbackName;
            document.body.appendChild(script);
        }

        function renderTable(data) {
            const tbody = document.getElementById('caseBody');
            tbody.innerHTML = '';
            
            // Start from index 1 to skip header row
            for(let i = 1; i < data.length; i++) {
                let row = data[i];
                // Status is index 13 (Column N)
                if (row[13] !== "Closed") {
                    let rowHtml = `<tr>
                        <td>${row[0]}</td>
                        <td>${row[3]}</td>
                        <td>${row[6]}</td>
                        <td>${row[13]}</td>
                        <td><button class="btn btn-sm btn-primary">Edit</button></td>
                    </tr>`;
                    tbody.innerHTML += rowHtml;
                }
            }
        }
        
        fetchCases();
    </script>
</body>
</html>
