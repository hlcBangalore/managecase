<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Bangalore</title>
    <style>.urgent-row { background-color: #f8d7da; }</style>
</head>
<body class="bg-light">
    <div class="container-fluid mt-4">
        <h2>HLC Bangalore</h2>
        <input type="text" id="searchInput" class="form-control mb-3" onkeyup="renderTable()" placeholder="Search...">
        <table class="table table-hover bg-white border">
            <thead>
                <tr>
                    <th>ID</th><th>Patient</th><th>Country</th><th>Congregation</th><th>Diagnosis</th><th>Stage</th><th>Status</th><th>HLC</th><th>PVG</th><th>Dr</th><th>Hospital</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="caseBody"></tbody>
        </table>
        <button class="btn btn-primary mb-4" onclick="loadClosed()">Load Older Cases</button>
    </div>

    <div class="modal" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-4">
                <h5>Case Details</h5>
                <div id="detailsContent"></div>
                <button class="btn btn-secondary mt-3" onclick="bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDDHUbYjX8ktsLr9TYvF_eDRgjhW9IOmSzVzn-QSHCzPPG223akAMSroCE7zrT0RK0rg/exec";
        let cachedData = [], currentMonths = 0;

        async function init(m = 0) {
            const cb = 'cb_' + Math.round(100000 * Math.random());
            window[cb] = (res) => { 
                cachedData = (m === 0) ? res.data : cachedData.slice(0, 1).concat(cachedData.slice(1).concat(res.data.slice(1)));
                renderTable(); 
            };
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=getCases&months=${m}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function renderTable() {
            const filter = document.getElementById("searchInput").value.toLowerCase();
            const tbody = document.getElementById('caseBody');
            const order = { "New": 1, "In Process": 2, "Closed": 3 };
            
            // Filter and sort the entire dataset
            let filteredData = cachedData.slice(1).filter(row => 
                row.some(cell => String(cell).toLowerCase().includes(filter))
            );
            
            let sortedData = filteredData.sort((a, b) => (order[a[13]] || 4) - (order[b[13]] || 4));
        
            tbody.innerHTML = '';
            sortedData.forEach((row, i) => {
                // Build table rows dynamically using mapped indices
                tbody.innerHTML += `<tr id="row-${i}">
                    <td>${row[0]}</td><td>${row[3]}</td><td>${row[6]}</td><td>${row[7]}</td>
                    <td>${row[12]}</td><td>${row[16]}</td><td>${row[13]}</td><td>${row[9]}</td>
                    <td>${row[11]}</td><td>${row[14]}</td><td>${row[15]}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editRow(${i})">Edit</button>
                        <button class="btn btn-sm btn-info" onclick="showDetails(${i})">Details</button>
                    </td>
                </tr>`;
            });
        }

        function editRow(i) {
            const row = document.getElementById(`row-${i}`);
            const originalValues = [];
            for(let j=0; j<11; j++) {
                originalValues.push(row.cells[j].innerText);
                row.cells[j].innerHTML = `<input class="form-control" value="${row.cells[j].innerText}">`;
            }
            row.cells[11].innerHTML = `
                <button class="btn btn-sm btn-success" onclick="saveRow(${i}, '${row.cells[0].querySelector('input').value}')">Save</button>
                <button class="btn btn-sm btn-secondary" onclick="cancelEdit(${i}, ${JSON.stringify(originalValues).replace(/"/g, "'")})">Cancel</button>`;
        }

        function saveRow(i, id) {
            const inputs = document.getElementById(`row-${i}`).querySelectorAll('input');
            const url = `${SCRIPT_URL}?action=updateCase&caseId=${id}&patient=${inputs[1].value}&country=${inputs[2].value}&congregation=${inputs[3].value}&diagnosis=${inputs[4].value}&stage=${inputs[5].value}&status=${inputs[6].value}&hlc=${inputs[7].value}&pvg=${inputs[8].value}&doctor=${inputs[9].value}&hospital=${inputs[10].value}&callback=cb_save`;
            window.cb_save = () => { alert("Saved!"); init(0); };
            const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
        }

        let currentCaseIndex = -1; // To track which case is being edited
        
        function showDetails(i) {
            currentCaseIndex = i;
            const row = cachedData[i+1];
            const headers = ["Case_ID", "Date", "Source", "Patient", "Age", "Sex", "Country", "Congregation", "Priority", "Primary_HLC", "Secondary_HLC", "PVG", "Diagnosis", "Status", "Treating_Dr", "Hospital", "Workflow_Stage", "Notes"];
            
            let html = `<table class="table table-bordered" id="editTable">`;
            headers.forEach((h, idx) => {
                // ID (index 0) and Date (index 1) are read-only
                const isReadOnly = (idx === 0 || idx === 1) ? 'readonly' : '';
                html += `<tr><th>${h}</th><td><input class="form-control" name="${h}" value="${row[idx] || ''}" ${isReadOnly}></td></tr>`;
            });
            html += `</table>`;
            
            // Buttons container
            html += `<div id="modalActions">
                        <button class="btn btn-primary" onclick="saveModalChanges()">Save</button>
                        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                     </div>`;
            
            document.getElementById('detailsContent').innerHTML = html;
            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        }
        
        function saveModalChanges() {
            const inputs = document.getElementById('editTable').querySelectorAll('input');
            const caseId = inputs[0].value;
            // Build parameters based on input names
            let params = `action=updateCase&caseId=${caseId}`;
            inputs.forEach(input => {
                params += `&${input.name.toLowerCase()}=${encodeURIComponent(input.value)}`;
            });
            
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?${params}&callback=cb_save`;
            window.cb_save = () => { alert("Saved!"); init(); closeModal(); };
            document.body.appendChild(s);
        }
        
        function closeModal() {
            bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide();
        }

        function cancelEdit(i, vals) {
            const row = document.getElementById(`row-${i}`);
            for(let j=0; j<11; j++) row.cells[j].innerText = vals[j];
            row.cells[11].innerHTML = `<button class="btn btn-sm btn-primary" onclick="editRow(${i})">Edit</button> <button class="btn btn-sm btn-info" onclick="showDetails(${i})">Details</button>`;
        }

        function loadClosed() { init(currentMonths += 2); }
        init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
