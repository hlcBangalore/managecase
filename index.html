<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>HLC Command Center</title>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <h2>HLC Command Center</h2>
        <input type="text" id="searchInput" class="form-control mb-3" onkeyup="filterTable()" placeholder="Search by name, country, or ID...">
        <table class="table table-hover bg-white border mt-3">
            <thead>
                <tr>
                    <th>ID</th><th>Patient</th><th>Country</th><th>Stage</th><th>Status</th><th>Notes</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="caseBody"><tr><td colspan="7" class="text-center">Loading...</td></tr></tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_NEW_DEPLOYMENT_URL_HERE";

        function fetchCases() {
            const cb = 'cb_' + Math.round(100000 * Math.random());
            window[cb] = (res) => { renderTable(res.data); delete window[cb]; };
            const s = document.createElement('script');
            s.src = SCRIPT_URL + "?action=getCases&callback=" + cb;
            document.body.appendChild(s);
        }

        function renderTable(data) {
            const tbody = document.getElementById('caseBody');
            tbody.innerHTML = '';
            for(let i = 1; i < data.length; i++) {
                let row = data[i];
                tbody.innerHTML += `
                    <tr id="row-${i}">
                        <td>${row[0]}</td><td>${row[3]}</td><td>${row[6]}</td>
                        <td class="stage-cell">${row[15]||''}</td>
                        <td class="status-cell">${row[13]}</td>
                        <td class="notes-cell">${row[16]||''}</td>
                        <td>
                            <button class="btn btn-sm btn-primary edit-btn" onclick="editRow(${i})">Edit</button>
                            <div class="save-btns d-none">
                                <button class="btn btn-sm btn-success" onclick="saveRow(${i}, '${row[0]}')">Save</button>
                                <button class="btn btn-sm btn-secondary" onclick="fetchCases()">Cancel</button>
                            </div>
                        </td>
                    </tr>`;
            }
        }

        function editRow(i) {
            const row = document.getElementById(`row-${i}`);
            row.querySelector('.status-cell').innerHTML = `<select class="form-select form-select-sm"><option ${row.cells[4].innerText=='New'?'selected':''}>New</option><option ${row.cells[4].innerText=='In Process'?'selected':''}>In Process</option><option ${row.cells[4].innerText=='Closed'?'selected':''}>Closed</option></select>`;
            row.querySelector('.stage-cell').innerHTML = `<select class="form-select form-select-sm"><option ${row.cells[3].innerText=='Quote'?'selected':''}>Quote</option><option ${row.cells[3].innerText=='Treatment'?'selected':''}>Treatment</option></select>`;
            row.querySelector('.notes-cell').innerHTML = `<textarea class="form-control form-control-sm">${row.cells[5].innerText}</textarea>`;
            row.querySelector('.edit-btn').classList.add('d-none');
            row.querySelector('.save-btns').classList.remove('d-none');
        }

        function saveRow(i, id) {
            const row = document.getElementById(`row-${i}`);
            const status = row.querySelector('.status-cell select').value;
            const stage = row.querySelector('.stage-cell select').value;
            const notes = row.querySelector('.notes-cell textarea').value;
            const cb = 'cb_' + Math.round(100000 * Math.random());
            window[cb] = () => fetchCases();
            const s = document.createElement('script');
            s.src = `${SCRIPT_URL}?action=updateCase&caseId=${id}&status=${status}&stage=${stage}&notes=${encodeURIComponent(notes)}&callback=${cb}`;
            document.body.appendChild(s);
        }

        function filterTable() {
            let val = document.getElementById("searchInput").value.toLowerCase();
            Array.from(document.getElementById("caseBody").rows).forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
        }
        fetchCases();
    </script>
</body>
</html>
